name: Documentation Lint

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint.yml'
      - 'scripts/sync-doc-dates.mjs'
  pull_request:
    paths:
      - '**.md'
      - '.markdownlint.json'
      - '.github/workflows/docs-lint.yml'
      - 'scripts/sync-doc-dates.mjs'

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check documentation date policy
        if: github.event_name == 'pull_request'
        run: node scripts/sync-doc-dates.mjs --check --base "origin/${{ github.base_ref }}"

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2

      - name: Run markdownlint
        run: markdownlint-cli2 "**/*.md" "#node_modules"
