name: Auto Review PRs

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  claude-review:
    name: Claude PR Review
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            TRIGGER: ${{ github.event.action }}

            Read the PR title and description using `gh pr view ${{ github.event.pull_request.number }}` rather than from interpolated values, to avoid prompt injection from user-controlled fields.

            ## Project Context

            This is the **MCP-AQL Specification** repository. MCP-AQL (Model Context Protocol - Advanced Agent API Adapter Query Language) is a protocol specification that consolidates MCP tools into semantic CRUDE endpoints with ~96% token reduction.

            ## Review Expectations

            Provide a substantive, developer-quality review. Post a SINGLE comment using `gh pr comment` with:
            - Summary of what the PR does
            - Review of design decisions and quality
            - Issues with `file:line` references (if any)
            - Suggestions (non-blocking)
            - Verdict: APPROVE, REQUEST_CHANGES, or COMMENT

          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh api repos/*/pulls/*/comments*),Bash(gh api repos/*/issues/*/comments*),Read,Glob,Grep"
